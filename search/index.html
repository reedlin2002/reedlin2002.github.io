<!-- ── Sprint 2: Navbar Scroll + Card Entrance Animations ── -->
<script type="text/javascript">
(function() {
  'use strict';

  /* ① Navbar Glassmorphism scroll toggle */
  var header = document.getElementById('header');
  if (header) {
    var onScroll = function() {
      if (window.scrollY > 50) {
        header.classList.add('scrolled');
      } else {
        header.classList.remove('scrolled');
      }
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll(); // 初始執行一次
  }

  /* ② 卡片 staggered 進場動畫（IntersectionObserver） */
  var cards = document.querySelectorAll('.shoka-card');
  if (cards.length > 0 && 'IntersectionObserver' in window) {
    var cardObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.style.animationPlayState = 'running';
          entry.target.classList.add('card-visible');
          cardObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    cards.forEach(function(card, i) {
      card.style.setProperty('--card-delay', (i * 0.08) + 's');
      card.classList.add('card-init');
      cardObserver.observe(card);
    });
  }

  /* ③ 文章內頁 H2/H3 自動加 anchor 連結 */
  if (document.querySelector('#post .content')) {
    var headings = document.querySelectorAll('#post .content h2, #post .content h3');
    headings.forEach(function(h) {
      if (h.id) {
        var anchor = document.createElement('a');
        anchor.className = 'heading-anchor';
        anchor.href = '#' + h.id;
        anchor.innerHTML = '<i class="fa-solid fa-link" style="font-size:0.6em;opacity:0.4;margin-left:8px;vertical-align:middle;"></i>';
        anchor.style.textDecoration = 'none';
        h.appendChild(anchor);
      }
    });
  }

})();
</script>

<!-- ── Sprint 3: Code Block Enhancement + TOC Highlight + Mobile Nav ── -->
<script type="text/javascript">
(function() {
  'use strict';

  /* ═══════════════════════════════════════════════════
     ① Code Block: 語言 Badge + Copy Button
     ═══════════════════════════════════════════════════ */
  var highlights = document.querySelectorAll('.highlight');
  highlights.forEach(function(block) {
    // 取得語言類型（Hexo 在 figure 上加 class，如 highlight javascript）
    var langClass = Array.from(block.classList).find(function(c) {
      return c !== 'highlight';
    });
    var lang = langClass || '';

    // 語言 Badge
    if (lang) {
      var badge = document.createElement('span');
      badge.className = 'lang-badge';
      badge.textContent = lang.toUpperCase();
      block.appendChild(badge);
    }

    // Copy Button
    var copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn';
    copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i>';
    copyBtn.setAttribute('aria-label', '複製程式碼');
    copyBtn.setAttribute('title', '複製');

    copyBtn.addEventListener('click', function() {
      // 從 .code td 取文字，相容 Hexo table highlight
      var codeLines = block.querySelectorAll('td.code .line, td.code span');
      var text = '';
      if (codeLines.length > 0) {
        var codeTd = block.querySelector('td.code');
        text = codeTd ? codeTd.innerText : '';
      } else {
        // fallback：直接取 code 元素
        var codeEl = block.querySelector('code');
        text = codeEl ? codeEl.innerText : block.innerText;
      }

      navigator.clipboard.writeText(text.trim()).then(function() {
        copyBtn.innerHTML = '<i class="fa-solid fa-check"></i>';
        copyBtn.classList.add('copied');
        setTimeout(function() {
          copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i>';
          copyBtn.classList.remove('copied');
        }, 2000);
      }).catch(function() {
        // clipboard API fallback
        var ta = document.createElement('textarea');
        ta.value = text.trim();
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        copyBtn.innerHTML = '<i class="fa-solid fa-check"></i>';
        setTimeout(function() {
          copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i>';
        }, 2000);
      });
    });

    block.appendChild(copyBtn);
  });

  /* ═══════════════════════════════════════════════════
     ② TOC IntersectionObserver：追蹤當前章節並高亮
     ═══════════════════════════════════════════════════ */
  var toc = document.getElementById('toc');
  if (toc) {
    // 樣式設定：讓 TOC 連結有 active class
    var tocLinks = toc.querySelectorAll('a');
    var headings = document.querySelectorAll('#post .content h2, #post .content h3');

    if (headings.length > 0 && tocLinks.length > 0) {
      var activeId = null;

      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            activeId = entry.target.id;
          }
        });
        // 更新 TOC active 狀態
        tocLinks.forEach(function(link) {
          var href = link.getAttribute('href');
          if (href === '#' + activeId) {
            link.classList.add('toc-active');
          } else {
            link.classList.remove('toc-active');
          }
        });
      }, {
        rootMargin: '-80px 0px -60% 0px',  // 觸發區：頂部扣除 navbar 高度
        threshold: 0
      });

      headings.forEach(function(h) {
        if (h.id) observer.observe(h);
      });
    }
  }

  /* ═══════════════════════════════════════════════════
     ③ Mobile Nav：點擊遮罩 / 外部區域關閉 Drawer
     ═══════════════════════════════════════════════════ */
  var navMenu = document.querySelector('#nav ul');
  var menuIconLinks = document.querySelectorAll('#menu-icon, #menu-icon-tablet');

  if (navMenu) {
    // 點擊 header 外部時自動關閉 nav（若已展開）
    document.addEventListener('click', function(e) {
      var header = document.getElementById('header');
      if (header && !header.contains(e.target)) {
        // Cactus 主題的 nav 用 display 控制，透過 jQuery toggle
        if (typeof $ !== 'undefined' && $('#nav ul').is(':visible')) {
          $('#nav ul').slideUp(200);
        }
      }
    });

    // Escape 鍵關閉
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && typeof $ !== 'undefined') {
        $('#nav ul').slideUp(200);
      }
    });

    // Mobile 手勢滑動關閉 (Touch Swipe)
    var touchStartX = 0;
    var touchStartY = 0;
    document.addEventListener('touchstart', function(e) {
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
    }, {passive: true});

    document.addEventListener('touchend', function(e) {
      if (typeof $ !== 'undefined' && $('#nav ul').is(':visible')) {
        var touchEndX = e.changedTouches[0].screenX;
        var touchEndY = e.changedTouches[0].screenY;
        
        // 判斷滑動方向 (Swipe Up 或是 Swipe Left)
        if (touchStartY - touchEndY > 50 || touchStartX - touchEndX > 50) {
          $('#nav ul').slideUp(200);
        }
      }
    }, {passive: true});
  }

})();
</script>

  $(function() {

    var $inputArea = $("input#search-input");

    $inputArea.focus(function() {
      var search_path = "search.xml";

      }
      var path = "/" + search_path;
      searchFunc(path, 'search-input', 'search-result');
    });

    $inputArea.keydown(function(e) {
      if (e.which == 13) {
        e.preventDefault();
      }
    });

    var observer = new MutationObserver(function(mutationsList, observer) {
      if (mutationsList.length == 1) {
        if (mutationsList[0].addedNodes.length) {
          $(".search-no-result").hide();
        } else if (mutationsList[0].removedNodes.length) {
          $(".search-no-result").show(200);
        }
      }
    });

    observer.observe($resultArea, { childList: true });

  });
  </script>
